name: hui-backend
region: sgp   # Singapore - gần Việt Nam nhất

services:
  - name: api
    github:
      repo: dungcv4/hui-backend
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_size_slug: basic-xxs   # $5/tháng - đủ cho MVP
    instance_count: 1
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 30
    envs:
      - key: USE_SQLITE
        value: "false"
      - key: JWT_SECRET_KEY
        value: "REPLACE_WITH_STRONG_SECRET"   # ⚠️ đổi trước khi deploy
        type: SECRET
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: JWT_EXPIRATION_HOURS
        value: "24"
      - key: SEPAY_APP_ID
        value: "SP-TEST-DDB8B947"
      - key: SEPAY_SECRET_KEY
        value: "spsk_test_ahr2tjP5XJQWEJYFKYmp1wWokmLknRrh"
        type: SECRET
      - key: SEPAY_WEBHOOK_SECRET
        value: "hui_webhook_secret_2025"
        type: SECRET
      - key: TELEGRAM_BOT_TOKEN
        value: "8047080394:AAHrzTk05l9OEDiOas3H-jg9Av73mfmJcJA"
        type: SECRET
      - key: CORS_ORIGINS
        value: "${APP_URL}"   # DO tự inject URL của frontend
      - key: DATABASE_URL
        scope: RUN_TIME
        value: "${hui-db.DATABASE_URL}"   # DO tự inject từ managed DB

databases:
  - name: hui-db
    engine: PG          # PostgreSQL
    version: "16"
    size: db-s-dev-database   # Free dev DB (dùng thử) hoặc đổi thành db-s-1vcpu-1gb ($15/tháng)
    num_nodes: 1
